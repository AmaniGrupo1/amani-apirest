# =============================================================================
# Promtail — Recolector de Logs para Amani API REST
# =============================================================================
# Recolecta logs de contenedores Docker y los envía a Loki.
# Los logs de Spring Boot (stdout) son capturados automáticamente.
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

# Destino: Loki
clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: amani
    batchwait: 1s
    batchsize: 1048576
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

# =============================================================================
# Fuentes de logs
# =============================================================================
scrape_configs:

  # ---------------------------------------------------------------------------
  # Logs de Docker — todos los contenedores
  # ---------------------------------------------------------------------------
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Usar el nombre del contenedor como label
      - source_labels: [__meta_docker_container_name]
        regex: "/?(.*)"
        target_label: container

      # Usar la imagen Docker como label
      - source_labels: [__meta_docker_container_image]
        target_label: image

      # Filtrar solo contenedores con label logging=promtail (o todos si no filtramos)
      # Descomenta la siguiente sección para filtrar solo contenedores marcados:
      # - source_labels: [__meta_docker_container_label_logging]
      #   regex: promtail
      #   action: keep

    pipeline_stages:
      # Parsear JSON si el log es JSON estructurado (Spring Boot con logback-json)
      - json:
          expressions:
            level: level
            logger: logger_name
            message: message
            timestamp: '"@timestamp"'
          # Si falla el parse JSON, continua con el log como texto plano

      # Extraer nivel de log del patrón de Spring Boot (%LEVEL %logger)
      - regex:
          expression: '(?i)(?P<level>TRACE|DEBUG|INFO|WARN|ERROR|FATAL)'

      # Etiquetar por nivel de log
      - labels:
          level:
          container:

      # Filtrar timestamps para mejorar el rendimiento
      - timestamp:
          format: RFC3339Nano
          source: timestamp

  # ---------------------------------------------------------------------------
  # Logs específicos del contenedor amani-api (si está dockerizado)
  # ---------------------------------------------------------------------------
  - job_name: amani-api-files
    static_configs:
      - targets:
          - localhost
        labels:
          job: amani-api
          application: amani-apirest
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      - labels:
          stream:
      - output:
          source: log
