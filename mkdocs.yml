site_name: AMANI API REST — Documentación
site_description: Documentación técnica de la plataforma AMANI para psicología clínica
site_author: Amani Team
site_url: https://amanigrupo1.github.io/amani-apirest/

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search:
      lang: es
  - swagger-ui-tag
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      title: En esta página

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AmaniGrupo1/amani-apirest

nav:
  - Inicio: index.md
  - Arquitectura:
      - Vista General: arquitectura/overview.md
      - Diagramas: arquitectura/diagramas.md
  - Backend:
      - Servicios Core: backend/servicios.md
      - Entidades y Modelos: backend/modelos.md
      - Objetos de Transferencia (DTOs): backend/dtos.md
  - API:
      - Endpoints REST: api/endpoints.md
  - Seguridad:
      - Autenticación JWT: seguridad/jwt.md
      - Filtros y Roles: seguridad/filtros.md
  - Observabilidad:
      - Monitoreo (Prometheus/Grafana): observabilidad/monitoreo.md
  - DevOps:
      - Contenedores (Docker): devops/docker.md
      - Flujos CI/CD: devops/cicd.md
  - Despliegue:
      - Guía de Producción: despliegue/produccion.md
  - Testing:
      - Pruebas e Informes: testing/informes.md
  - Guías Anteriores:
      - GCP Deploy: guides/gcp-deploy.md
      - Local Setup: guides/local-setup.md
      - Firebase Fixes: guides/FIREBASE-FIX-GUIDE.md
