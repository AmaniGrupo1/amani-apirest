site_name: AMANI API REST — Documentación
site_description: Documentación técnica de la plataforma AMANI para psicología clínica
site_author: Amani Team
site_url: https://amanigrupo1.github.io/amani-apirest/

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search:
      lang: es
  - awesome-pages
  - swagger-ui-tag
  - mermaid2
  - minify:
      minify_html: true
  - git-revision-date-localized:
      locale: es
      type: timeago

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      title: En esta página

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AmaniGrupo1/amani-apirest
  version:
    provider: mike

copyright: Copyright © 2026 Amani Team — Todos los derechos reservados
