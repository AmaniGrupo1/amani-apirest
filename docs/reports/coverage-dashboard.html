<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMANI Dashboard — Tests & Cobertura</title>
<style>
:root{ --bg:#0b0f19; --card:#111827; --elev:#1f2937; --border:#374151; --text:#e5e7eb; --muted:#9ca3af; --green:#22c55e; --yellow:#eab308; --red:#ef4444; --blue:#3b82f6; --purple:#8b5cf6; }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:1400px;margin:0 auto;padding:24px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
h1{font-size:1.8rem;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.meta{color:var(--muted);font-size:.9rem}
.status-badge{display:inline-block;padding:4px 12px;border-radius:999px;font-size:.8rem;font-weight:700}
.status-badge.green{background:#22c55e22;color:var(--green);border:1px solid var(--green)}
.status-badge.yellow{background:#eab30822;color:var(--yellow);border:1px solid var(--yellow)}
.status-badge.red{background:#ef444422;color:var(--red);border:1px solid var(--red)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin:24px 0}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden;transition:transform .2s}
.card:hover{transform:translateY(-2px)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.card.green::before{background:var(--green)}.card.yellow::before{background:var(--yellow)}.card.red::before{background:var(--red)}.card.blue::before{background:var(--blue)}
.card h3{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.card .value{font-size:2rem;font-weight:700;display:flex;align-items:center;gap:8px}
.card .delta{font-size:.9rem;font-weight:600;padding:2px 8px;border-radius:6px;background:var(--elev)}
.delta.up{color:var(--green)}.delta.down{color:var(--red)}.delta.neut{color:var(--muted)}
.card .detail{font-size:.8rem;color:var(--muted);margin-top:6px}
.bar-track{background:var(--elev);border-radius:6px;height:10px;margin-top:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .6s ease}
.bar-fill.green{background:linear-gradient(90deg,#16a34a,#22c55e)}
.bar-fill.yellow{background:linear-gradient(90deg,#ca8a04,#eab308)}
.bar-fill.red{background:linear-gradient(90deg,#dc2626,#ef4444)}
.bar-fill.blue{background:linear-gradient(90deg,#2563eb,#3b82f6)}
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin:24px 0}
.section h2{font-size:1.2rem;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section h2 .count{color:var(--muted);font-size:.85rem;font-weight:400}
.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:20px}
.chart-box{background:var(--elev);border-radius:10px;padding:16px;height:300px}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:.8rem;transition:.2s}
.filter-btn:hover{border-color:var(--blue)}
.filter-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.table-wrap{max-height:500px;overflow-y:auto;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{background:var(--elev);color:var(--muted);text-transform:uppercase;font-size:.75rem;letter-spacing:1px;padding:10px 12px;text-align:left;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:1;cursor:pointer;user-select:none}
th:hover{background:#283141}
td{padding:8px 12px;border-bottom:1px solid var(--border)}
tr:hover td{background:var(--elev)}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.75rem;font-weight:600}
.badge.green{background:#22c55e22;color:var(--green)}.badge.yellow{background:#eab30822;color:var(--yellow)}.badge.red{background:#ef444422;color:var(--red)}
.pct{font-weight:700}
.pct.green{color:var(--green)}.pct.yellow{color:var(--yellow)}.pct.red{color:var(--red)}
.mini-bar{display:inline-block;width:80px;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;vertical-align:middle;margin-left:6px}
.mini-bar-fill{height:100%;border-radius:4px}
.search-box{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.85rem;margin-bottom:12px}
.search-box:focus{outline:none;border-color:var(--blue)}
.summary-row{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:12px}
.summary-item{font-size:.85rem;color:var(--muted)}
.summary-item strong{color:var(--text)}
.exec-summary{background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
.exec-summary p{margin:6px 0;font-size:.95rem}
@media(max-width:768px){.charts{grid-template-columns:1fr}.cards{grid-template-columns:1fr 1fr}}
</style>
</head>

function drawLineChart(containerId, labels, datasets){
  const W=500,H=250,PAD=30;
  let svg = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:100%">';
  svg += '<rect width="'+W+'" height="'+H+'" fill="#111827" rx="8"/>';
  for(let i=0;i<=4;i++){ let y=PAD+(H-2*PAD)*(i/4); svg += '<line x1="'+PAD+'" y1="'+y+'" x2="'+(W-PAD)+'" y2="'+y+'" stroke="#374151" stroke-width="0.5"/>'; }
  const n = labels.length;
  if(n<2){ svg += '<text x="'+(W/2)+'" y="'+(H/2)+'" fill="#9ca3af" text-anchor="middle" font-size="12">Datos insuficientes</text>'; }
  else {
    datasets.forEach(ds=>{
      const min = Math.min(...ds.data), max = Math.max(...ds.data);
      const range = max-min || 1;
      const points = ds.data.map((v,i)=>{
        const x = PAD + (W-2*PAD)*(i/(n-1));
        const y = PAD + (H-2*PAD)*(1-(v-min)/range);
        return x+','+y;
      }).join(' ');
      svg += '<polyline points="'+points+'" fill="none" stroke="'+ds.color+'" stroke-width="2"/>';
      const area = points + ' '+(PAD+(W-2*PAD))+','+(H-PAD)+' '+PAD+','+(H-PAD);
      svg += '<polygon points="'+area+'" fill="'+ds.color+'" fill-opacity="0.12" stroke="none"/>';
      ds.data.forEach((v,i)=>{
        const x = PAD + (W-2*PAD)*(i/(n-1));
        const y = PAD + (H-2*PAD)*(1-(v-min)/range);
        svg += '<circle cx="'+x+'" cy="'+y+'" r="3" fill="'+ds.color+'"/>';
      });
    });
    labels.forEach((lbl,i)=>{
      const x = PAD + (W-2*PAD)*(i/(n-1));
      svg += '<text x="'+x+'" y="'+(H-PAD+14)+'" fill="#9ca3af" font-size="9" text-anchor="middle">'+lbl+'</text>';
    });
  }
  let lx=PAD,ly=14;
  datasets.forEach(ds=>{
    svg += '<rect x="'+lx+'" y="'+ly+'" width="8" height="8" fill="'+ds.color+'" rx="2"/>';
    svg += '<text x="'+(lx+12)+'" y="'+(ly+7)+'" fill="#e5e7eb" font-size="10">'+ds.label+'</text>';
    lx += ds.label.length*7+24;
  });
  svg += '</svg>';
  document.getElementById(containerId).innerHTML = svg;
}

function statusColor(pct){
  if(pct >= 80) return 'green';
  if(pct >= 60) return 'yellow';
  return 'red';
}
function pct(c,t){ return t ? (c*100/t).toFixed(1) : '0.0'; }

function render(){
  const snapshots = __DATA;
  const cur = snapshots[0];
  const prev = snapshots[1] || null;
  document.getElementById('run-date').textContent = cur.date;

  const allPass = cur.tests.errors === 0 && cur.tests.failures === 0;
  const highCov = cur.coverage.summary.line_pct >= 70;
  const g = document.getElementById('global-status');
  if(allPass && highCov) g.innerHTML = '<span class="status-badge green">HEALTHY</span>';
  else if(allPass) g.innerHTML = '<span class="status-badge yellow">OK — cobertura mejorable</span>';
  else g.innerHTML = '<span class="status-badge red">ATENCIÓN — tests fallando</span>';

  const t = cur.tests;
  const cov = cur.coverage.summary;
  const es = document.getElementById('exec-summary');
  es.innerHTML = `

  `;

  const kpiData = [
    {label:'Tests totales', value:t.total, color:'blue', detail:`${t.passed} pasados · ${t.errors} errores · ${t.failures} fallidos`, key:'total'},
    {label:'Tests pasados', value:t.passed, color:'green', detail:`${pct(t.passed,t.total)}% éxito · ${t.skipped} skipped`, key:'passed'},
    {label:'Tests con error', value:t.errors, color:'red', detail:`${t.failures} fallidos · ${t.skipped} skipped`, key:'errors'},
    {label:'Tiempo total', value:t.time.toFixed(1)+'s', color:'blue', detail:`${(t.time/t.total).toFixed(2)}s/test medio`, key:'time'},
    {label:'Cobertura líneas', value:cov.line_pct.toFixed(1)+'%', color:statusColor(cov.line_pct), detail:`${cov.line_covered}/${cov.line_covered+cov.line_missed} líneas`, key:'line_pct'},
    {label:'Cobertura ramas', value:cov.branch_pct.toFixed(1)+'%', color:statusColor(cov.branch_pct), detail:`${cov.branch_covered}/${cov.branch_covered+cov.branch_missed} ramas`, key:'branch_pct'},
  ];

  const cards = document.getElementById('kpi-cards');
  kpiData.forEach((k,i)=>{
    let delta = '';
    if(prev){
      let cv, pv;
      if(k.key === 'time'){ cv = cur.tests.time; pv = prev.tests.time; }
      else if(k.key === 'line_pct'){ cv = cur.coverage.summary.line_pct; pv = prev.coverage.summary.line_pct; }
      else if(k.key === 'branch_pct'){ cv = cur.coverage.summary.branch_pct; pv = prev.coverage.summary.branch_pct; }
      else { cv = cur.tests[k.key]; pv = prev.tests[k.key]; }
      const d = cv - pv;
      const sign = d > 0 ? '↑' : d < 0 ? '↓' : '→';
      let cls = d > 0 ? 'up' : d < 0 ? 'down' : 'neut';
      if(k.key==='errors' || k.key==='failures') cls = d<0?'up':d>0?'down':'neut';
      delta = `<span class="delta ${cls}">${sign} ${Math.abs(d).toFixed(d%1===0?0:1)}</span>`;
    }
    cards.innerHTML += `
      <div class="card ${k.color}">
        <h3>${k.label}</h3>
        <div class="value">${k.value}${delta}</div>
        <div class="detail">${k.detail}</div>
        <div class="bar-track"><div class="bar-fill ${k.color}" style="width:${k.label.includes('%')?parseFloat(k.value):100}%"></div></div>
      </div>`;
  });

  const recent = snapshots.slice(0,5).reverse();
  const labels = recent.map(s => s.date.split(' ')[0]);
  drawLineChart('trend-tests', labels, [
    {label:'Pasados', data: recent.map(s=>s.tests.passed), color:'#22c55e'},
    {label:'Errores', data: recent.map(s=>s.tests.errors), color:'#ef4444'}
  ]);
  drawLineChart('trend-coverage', labels, [
    {label:'Líneas %', data: recent.map(s=>s.coverage.summary.line_pct), color:'#3b82f6'},
    {label:'Ramas %', data: recent.map(s=>s.coverage.summary.branch_pct), color:'#8b5cf6'}
  ]);

  document.getElementById('test-count').textContent = `(${t.suites.length} suites, ${t.total} tests)`;
  document.getElementById('test-summary').innerHTML = `
    <div class="summary-item"><strong>${t.total}</strong> tests totales</div>
    <div class="summary-item"><strong style="color:var(--green)">${t.passed}</strong> pasados</div>
    <div class="summary-item"><strong style="color:var(--red)">${t.errors}</strong> errores</div>
    <div class="summary-item"><strong style="color:var(--yellow)">${t.failures}</strong> fallidos</div>
    <div class="summary-item"><strong>${t.skipped}</strong> skipped</div>
    <div class="summary-item"><strong>${t.time.toFixed(1)}s</strong> tiempo total</div>
  `;

  const tFilters = [
    {label:'Todas',f:()=>true},
    {label:'Con errores',f:s=>s.errors>0},
    {label:'Con fallos',f:s=>s.failures>0},
    {label:'Lentas (>2s)',f:s=>s.time>2},
    {label:'Vacías (0 tests)',f:s=>s.tests===0},
  ];
  let tActive=0;
  const tFilterBar = document.getElementById('test-filters');
  const tBody = document.querySelector('#test-table tbody');
  function renderTests(filterIdx, search=''){
    tActive = filterIdx;
    tFilterBar.querySelectorAll('.filter-btn').forEach((b,i)=>b.classList.toggle('active',i===filterIdx));
    const filtered = t.suites.filter(s=>tFilters[filterIdx].f(s) && s.name.toLowerCase().includes(search.toLowerCase()));
    tBody.innerHTML = '';
    filtered.forEach(s=>{
      const st = s.errors>0?'red':s.failures>0?'yellow':'green';
      tBody.innerHTML += `<tr>
        <td><code>${s.name}</code></td>
        <td>${s.tests}</td>
        <td style="color:var(--green)">${s.passed}</td>
        <td style="color:var(--red)">${s.errors}</td>
        <td style="color:var(--yellow)">${s.failures}</td>
        <td>${s.skipped}</td>
        <td>${s.time.toFixed(2)}s</td>
        <td><span class="badge ${st}">${st==='green'?'OK':s.errors>0?'ERROR':'FAIL'}</span></td>
      </tr>`;
    });
  }
  tFilters.forEach((f,i)=>{
    const b = document.createElement('button'); b.className='filter-btn'+(i===0?' active':''); b.textContent=f.label; b.onclick=()=>renderTests(i,document.getElementById('test-search').value); tFilterBar.appendChild(b);
  });
  document.getElementById('test-search').addEventListener('input',e=>renderTests(tActive,e.target.value));
  renderTests(0);

  const classes = cur.coverage.classes;
  document.getElementById('cov-count').textContent = `(${classes.length} clases)`;

  const cFilters = [
    {label:'Todas',f:()=>true},
    {label:'P0 Críticas',f:c=>classify(c)==='P0'},
    {label:'P1 Alta',f:c=>classify(c)==='P1'},
    {label:'Controllers',f:c=>c.pkg.includes('controllers.')},
    {label:'Services',f:c=>c.pkg.includes('services.')},
    {label:'🔴 Rojo (<60%)',f:c=>parseFloat(pct(c.line_covered,c.line_total))<60},
    {label:'🟡 Amarillo',f:c=>{const p=parseFloat(pct(c.line_covered,c.line_total));return p>=60&&p<80;}},
    {label:'🟢 Verde (≥80%)',f:c=>parseFloat(pct(c.line_covered,c.line_total))>=80},
  ];
  let cActive=0;
  const cFilterBar = document.getElementById('cov-filters');
  const cBody = document.querySelector('#cov-table tbody');
  function renderCov(filterIdx, search=''){
    cActive = filterIdx;
    cFilterBar.querySelectorAll('.filter-btn').forEach((b,i)=>b.classList.toggle('active',i===filterIdx));
    const filtered = classes.filter(c=>cFilters[filterIdx].f(c) && (c.pkg+'.'+c.cls).toLowerCase().includes(search.toLowerCase()));
    filtered.sort((a,b)=>parseFloat(pct(a.line_covered,a.line_total))-parseFloat(pct(b.line_covered,b.line_total)));
    cBody.innerHTML = '';
    filtered.forEach(c=>{
      const lp = pct(c.line_covered,c.line_total);
      const bp = pct(c.branch_covered,c.branch_total);
      const ls = statusColor(parseFloat(lp));
      const pri = classify(c);
      const priClass = pri==='P0'?'red':pri==='P1'?'yellow':'green';
      const shortName = c.pkg.replace('com.amani.amaniapirest.','') + '.' + c.cls;
      cBody.innerHTML += `<tr>
        <td><code>${shortName}</code></td>
        <td>${c.line_covered}/${c.line_total}</td>
        <td><span class="pct ${ls}">${lp}%</span><span class="mini-bar"><span class="mini-bar-fill" style="width:${lp}%;background:var(--${ls})"></span></span></td>
        <td>${c.branch_total>0?c.branch_covered+'/'+c.branch_total:'—'}</td>
        <td>${c.branch_total>0?`<span class="pct ${statusColor(parseFloat(bp))}">${bp}%</span>`:'—'}</td>
        <td><span class="badge ${priClass}">${pri}</span></td>
      </tr>`;
    });
  }
  cFilters.forEach((f,i)=>{
    const b = document.createElement('button'); b.className='filter-btn'+(i===0?' active':''); b.textContent=f.label; b.onclick=()=>renderCov(i,document.getElementById('cov-search').value); cFilterBar.appendChild(b);
  });
  document.getElementById('cov-search').addEventListener('input',e=>renderCov(cActive,e.target.value));
  renderCov(0);

  const p0 = classes.filter(c=>classify(c)==='P0');
  const p1 = classes.filter(c=>classify(c)==='P1');
  function avgPct(list){
    if(!list.length) return 0;
    const s = list.reduce((a,c)=>a+parseFloat(pct(c.line_covered,c.line_total)),0);
    return (s/list.length).toFixed(1);
  }
  function redCount(list){ return list.filter(c=>parseFloat(pct(c.line_covered,c.line_total))<60).length; }
  document.getElementById('prio-summary').innerHTML = `
    <div class="summary-row">
      <div class="summary-item"><strong style="color:var(--red)">P0</strong> ${p0.length} clases · ${avgPct(p0)}% líneas media · ${redCount(p0)} en rojo</div>
      <div class="summary-item"><strong style="color:var(--yellow)">P1</strong> ${p1.length} clases · ${avgPct(p1)}% líneas media · ${redCount(p1)} en rojo</div>
      <div class="summary-item"><strong style="color:var(--green)">P2</strong> ${classes.length-p0.length-p1.length} clases · ${avgPct(classes.filter(c=>classify(c)==='P2'))}% líneas media</div>
    </div>
  `;
}

function classify(c){
  const p = c.pkg;
  const short = p.replace('com.amani.amaniapirest.','') + '.' + c.cls;
  const p0s = ['configuration.JwtAuthFilter','configuration.UserDetailsServiceImpl','configuration.SecurityConfig','configuration.JwtUtil',
    'services.CitaService','services.CitaAgendaService','services.paciente.CitaService',
    'controllers.login.AuthController','controllers.login.FirebaseAuthController',
    'controllers.controladorPaciente.CitaController','controllers.controladorPsicologo.CitaControladorPsicologo'];
  if(p0s.some(x=>short.startsWith(x))) return 'P0';
  if(p.includes('controllers.') || p.includes('services.')) return 'P1';
  return 'P2';
}

render();
</script>
</body>
</html>
