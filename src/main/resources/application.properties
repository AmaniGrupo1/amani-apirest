# =============================================================================
# Amani API REST — Configuracion base (compartida entre todos los perfiles)
# =============================================================================
# Perfiles disponibles:
#   local  → -Dspring.profiles.active=local   (Sin GCP, sin Firebase)
#   gcp    → -Dspring.profiles.active=gcp     (ADC + Secret Manager + Firebase real)
#   test   → @ActiveProfiles("test")          (H2, sin Firebase, sin secrets)

spring.application.name=amani-apirest
server.port=8080
server.address=0.0.0.0

# --- Datasource (base) ---
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=psicologia_app
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.bind.trace-level=TRACE
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# --- Mail (base) ---
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=noreply@apppsicologas.com
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# --- JPA ---
spring.jpa.show-sql=true
spring.cache.type=caffeine

# --- OpenAPI / Swagger ---
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.operations-sorter=method

# --- Subida de archivos ---
file.upload-dir=uploads

# --- JWT ---
jwt.secret=amani-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000

# --- Logging ---
logging.level.root=WARN
logging.level.com.amani.amaniapirest=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.servlet.DispatcherServlet=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.zaxxer.hikari=WARN
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} : %msg%n

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# --- Firebase (por defecto desactivado; los perfiles sobreescriben) ---
firebase.enabled=false
