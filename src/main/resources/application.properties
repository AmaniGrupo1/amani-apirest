spring.application.name=amani-apirest
server.port=8080
server.address=0.0.0.0

#spring.datasource.url=jdbc:postgresql://localhost:5432/felix_db
#spring.datasource.username=felixdb
#spring.datasource.password=1234


spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=Sandia4you

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# --- Spring Mail -----------------------------------------------------------
# Cambiar host/port/username/password por los valores del servidor SMTP real.
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=noreply@apppsicologas.com
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# --- openapi -----------------------------------------------------------
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.operationsSorter=method

# --- Subida de archivos -----------------------------------------------------------
# Directorio donde se guardan las imßgenes de perfil
file.upload-dir=uploads
# LĒmite por archivo (debe coincidir con la validaci¾n en FileStorageService)
spring.servlet.multipart.max-file-size=5MB
# LĒmite total de la request (margen extra para headers)
spring.servlet.multipart.max-request-size=10MB

spring.jpa.properties.hibernate.default_schema=psicologia_app

# --- JWT -----------------------------------------------------------
jwt.secret=amani-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000
# ??? NIVEL GLOBAL ???????????????????????????????????????????
logging.level.root=WARN

# ??? TU PAQUETE ?????????????????????????????????????????????
logging.level.com.amani.amaniapirest=DEBUG

# ??? WEB (solo requests, sin internals de Spring) ???????????
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.servlet.DispatcherServlet=WARN

# ??? SEGURIDAD (solo errores) ???????????????????????????????
logging.level.org.springframework.security=WARN

# ??? JPA / HIBERNATE ????????????????????????????????????????
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
spring.jpa.properties.hibernate.format_sql=true

# ??? HIKARI (solo si hay problemas de conexi?n) ?????????????
logging.level.com.zaxxer.hikari=WARN

# ??? FORMATO DEL LOG ????????????????????????????????????????
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} : %msg%n
