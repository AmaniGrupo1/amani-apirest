# =============================================================================
# Perfil TEST — H2, sin Firebase, sin secrets
# =============================================================================
# Se activa con @ActiveProfiles("test") en las clases de test.

# --- No importar secretos en tests ---
spring.config.import=optional:sm://

# --- Datasource H2 en memoria ---
spring.datasource.url=jdbc:h2:mem:amani_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS psicologia_app\\;SET SCHEMA psicologia_app
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.default_schema=psicologia_app
spring.sql.init.schema-locations=classpath:schema-h2.sql
spring.sql.init.mode=always

# --- Mail (no envia mails reales en tests) ---
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# --- Firebase desactivado en tests ---
firebase.enabled=false

# --- Logging reducido en tests ---
logging.level.root=WARN
logging.level.com.amani.amaniapirest=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
