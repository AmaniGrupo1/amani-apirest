# =============================================================================
# Perfil GCP — usa ADC, Secret Manager y Firebase real
# =============================================================================
# Activar con: ./mvnw spring-boot:run -Dspring.profiles.active=gcp
# O en Cloud Run: SPRING_PROFILES_ACTIVE=gcp

# --- Secret Manager ---
spring.config.import=optional:sm://firebase-service-account
spring.cloud.gcp.project-id=amani-160bf

# --- Datasource (variables de entorno) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.cloud.gcp.sql.enabled=false
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update

# --- Firebase (production) ---
firebase.enabled=true
firebase.database.url=https://amani-160bf-default-rtdb.europe-west1.firebasedatabase.app/

# --- Actuator (producción GCP) ---
management.endpoint.health.show-details=never
management.endpoints.web.exposure.include=health,prometheus,info
management.metrics.tags.environment=production

# --- Logging producción (JSON para Cloud Logging) ---
logging.level.root=WARN
logging.level.com.amani.amaniapirest=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
