# =============================================================================
# Perfil LOCAL — funciona SIN GCP, SIN Secret Manager, SIN Firebase
# =============================================================================
# Activar con: ./mvnw spring-boot:run -Dspring.profiles.active=local
# O con: SPRING_PROFILES_ACTIVE=local ./mvnw spring-boot:run

# --- No importar secretos en local ---
spring.config.import=optional:sm://

# --- Datasource local ---
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=Sandia4you
spring.jpa.show-sql=true

# --- Firebase (desactivado por defecto) ---
firebase.enabled=false
firebase.emulator.enabled=false
firebase.database.url=http://localhost:9000?ns=amani-160bf-default-rtdb
firebase.auth.emulator-host=localhost
firebase.auth.emulator-port=9099

# --- Logging local ---
logging.level.com.amani.amaniapirest=DEBUG
logging.level.com.amani.amaniapirest.gateway.noop=INFO
logging.level.com.google.firebase=WARN
