# =============================================================================
# Propiedades de test para CI
# =============================================================================
# Este perfil sobreescribe la conexion a PostgreSQL para el entorno de CI
# (GitHub Actions con contenedor PostgreSQL como servicio).
# =============================================================================

# --- DataSource: conexion al contenedor PostgreSQL de CI ---
spring.datasource.url=jdbc:postgresql://localhost:5432/psicologia_app
spring.datasource.username=amani
spring.datasource.password=amani
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=psicologia_app
spring.jpa.show-sql=false

# --- Mail: deshabilitado en CI ---
spring.mail.host=localhost
spring.mail.port=1025

# --- Logs: reducir verbosidad en CI ---
logging.level.root=WARN
logging.level.com.amani.amaniapirest=WARN