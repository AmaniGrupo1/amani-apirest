# =============================================================================
# Propiedades de test (perfil "test")
# =============================================================================
# Se activa con @ActiveProfiles("test") en las clases de test.
# =============================================================================

# --- JPA: reducir verbosidad en tests y deshabilitar auto-generación de DDL ---
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- Datasource en memoria para tests locales/sandbox ---
spring.datasource.url=jdbc:h2:mem:amani_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS psicologia_app\\;SET SCHEMA psicologia_app
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.properties.hibernate.default_schema=psicologia_app

# --- Inicialización manual del schema en H2 ---
spring.sql.init.schema-locations=classpath:schema-h2.sql
spring.sql.init.mode=always

# --- Mail: apuntar a un servidor de correo inexistente (los tests no envían mails) ---
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# --- Logs: reducir verbosidad en tests ---
logging.level.root=WARN
logging.level.com.amani.amaniapirest=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
