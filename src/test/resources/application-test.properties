# =============================================================================
# Propiedades de test (perfil "test")
# =============================================================================
# Se activa con @ActiveProfiles("test") en las clases de test.
# En CI las variables de entorno SPRING_DATASOURCE_* sobreescriben el datasource;
# aquí solo se ajusta lo que difiere respecto al entorno de desarrollo local.
# =============================================================================

# --- JPA: reducir verbosidad en tests ---
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# --- Mail: apuntar a un servidor de correo inexistente (los tests no envían mails) ---
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# --- Logs: reducir verbosidad en tests ---
logging.level.root=WARN
logging.level.com.amani.amaniapirest=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

