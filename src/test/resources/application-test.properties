spring.config.import=optional:sm://

spring.datasource.url=jdbc:h2:mem:amani_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS psicologia_app\\;SET SCHEMA psicologia_app
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.default_schema=psicologia_app
spring.sql.init.schema-locations=classpath:schema-h2.sql
spring.sql.init.mode=always
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=create-drop

spring.flyway.enabled=false
spring.task.scheduling.enabled=false

jwt.secret=test-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=3600000

firebase.enabled=false

spring.mail.host=localhost
spring.mail.port=3025
