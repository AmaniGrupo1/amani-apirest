# =============================================================================
# Docker Compose — Stack de Monitoreo Amani (Producción / Staging)
# =============================================================================
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# Accesos:
#   Grafana       → http://localhost:3000   (admin / admin — cambiar en primera entrada)
#   Prometheus    → http://localhost:9090
#   Alertmanager  → http://localhost:9093
#   Loki          → http://localhost:3100   (interno, vía Grafana)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Prometheus — recolector de métricas
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: amani-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    networks:
      - monitoring
      - default
    depends_on:
      - alertmanager

  # ---------------------------------------------------------------------------
  # Grafana — dashboards y visualización
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    container_name: amani-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-amani-monitoring-2024}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_SMTP_ENABLED: "false"
      GF_LOG_MODE: console
      GF_LOG_LEVEL: warn
      GF_FEATURE_TOGGLES_ENABLE: "lokiLogs"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring
    depends_on:
      - prometheus
      - loki

  # ---------------------------------------------------------------------------
  # Alertmanager — gestión y enrutamiento de alertas (Slack)
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: amani-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://alertmanager:9093"
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/dummy}
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Loki — almacenamiento y consulta de logs
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.1.0
    container_name: amani-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Promtail — recolector de logs → Loki
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.1.0
    container_name: amani-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    depends_on:
      - loki

  # ---------------------------------------------------------------------------
  # Node Exporter — métricas del host (CPU, RAM, disco)
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: amani-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Postgres Exporter — métricas de PostgreSQL
  # ---------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: amani-postgres-exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_PASSWORD:-Sandia4you}@postgres:5432/postgres?sslmode=disable"
    networks:
      - monitoring
      - default

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
  loki_data:
    driver: local

networks:
  monitoring:
    driver: bridge
    name: amani-monitoring
