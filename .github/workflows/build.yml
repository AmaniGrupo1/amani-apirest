# =============================================================================
# CI – Build, Test & Visual Dashboard
# =============================================================================
# distributionManagement ya configurado en pom.xml para GitHub Packages
# (amanigrupo1/amani-apirest).
# =============================================================================

name: "CI – Build & Test Dashboard"

# ---------------------------------------------------------------------------
# Permisos globales del workflow
# ---------------------------------------------------------------------------
permissions:
  contents: read        # lectura del repo (checkout)
  checks: write         # escritura de checks (test-reporter)
  packages: write       # publicación en GitHub Packages (deploy)
  pull-requests: write  # comentarios de test-reporter en PRs

# ---------------------------------------------------------------------------
# Evitar ejecuciones paralelas en la misma rama
# ---------------------------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Variables de entorno globales
# ---------------------------------------------------------------------------
env:
  JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"

# ---------------------------------------------------------------------------
# Disparadores del workflow
# ---------------------------------------------------------------------------
on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "*.md"

# =============================================================================
# JOBS
# =============================================================================
jobs:

  # ===========================================================================
  # Job 1: Verificar compilación, ejecutar tests y generar dashboard HTML
  # ===========================================================================
  verify:
    name: "Verify – Compile, Test & Dashboard"
    runs-on: ubuntu-latest

    # --- Servicio PostgreSQL para los tests de integración ---
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: psicologia_app
          POSTGRES_USER: amani
          POSTGRES_PASSWORD: amani
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U amani -d psicologia_app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # --- Checkout del código fuente ---
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Inicializar el esquema de la base de datos ---
      - name: "Initialize database schema"
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U amani -d psicologia_app; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 1
          done
          PGPASSWORD=amani psql \
            -h localhost \
            -p 5432 \
            -U amani \
            -d psicologia_app \
            -f src/main/resources/amani.sql

      # --- Configurar JDK 21 (coincide con <java.version> del pom.xml) ---
      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # --- Dar permisos de ejecución al Maven Wrapper ---
      - name: "Grant execute permission to mvnw"
        run: chmod +x ./mvnw

      # --- Compilar y ejecutar tests (propiedades de BD sobreescribas por env vars) ---
      - name: "Compile & test (verify)"
        run: ./mvnw --batch-mode --no-transfer-progress verify -Dskip.openapi=true
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/psicologia_app
          SPRING_DATASOURCE_USERNAME: amani
          SPRING_DATASOURCE_PASSWORD: amani
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
          SPRING_SQL_INIT_MODE: never

      # --- Generar dashboard HTML desde JUnit XML ---
      - name: "Generate HTML Test Dashboard"
        if: always()
        run: |
          python3 .github/scripts/generate-html-dashboard.py \
            --surefire target/surefire-reports \
            --failsafe target/failsafe-reports \
            --output reports/html

      # --- Generar resumen visual en GitHub Step Summary ---
      - name: "Generate Visual Summary"
        if: always()
        run: |
          bash .github/scripts/generate-summary.sh \
            target/surefire-reports \
            target/failsafe-reports \
            target/site/jacoco/jacoco.csv
          if [ -f target/site/jacoco/jacoco.csv ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 📋 Cobertura P0 y P1" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            bash scripts/generate-p0-coverage-visual.sh target/site/jacoco/jacoco.csv doc
            cat doc/coverage-p0-visual.md >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat doc/coverage-p1-visual.md >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔗 Artefactos" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [📥 Descargar HTML Dashboard](reports/html/index.html)" >> $GITHUB_STEP_SUMMARY
          echo "- [📥 Descargar JaCoCo Coverage](target/site/jacoco)" >> $GITHUB_STEP_SUMMARY

      # --- Publicar resultados de tests como check de GitHub ---
      - name: "Publish test results"
        if: always()
        uses: dorny/test-reporter@v1.9.1
        with:
          name: Maven Test Results
          path: '**/target/**/TEST-*.xml'
          reporter: java-junit
          fail-on-error: true

      # --- SonarQube Scan (opcional, solo si hay token configurado) ---
      - name: "SonarQube Scan"
        if: env.SONAR_TOKEN != ''
        run: ./mvnw --batch-mode --no-transfer-progress sonar:sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # --- Subir reportes JUnit XML como artefactos ---
      - name: "Upload JUnit XML Reports"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-xml-reports
          path: |
            target/surefire-reports
            target/failsafe-reports

      # --- Subir dashboard HTML como artefacto ---
      - name: "Upload HTML Dashboard"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-test-dashboard
          path: reports/html

      # --- Subir cobertura JaCoCo como artefacto ---
      - name: "Upload JaCoCo Coverage"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco

  # Job 2: Construir artefacto y publicar en GitHub Packages
  # ===========================================================================
  build-artifact:
    name: "Build – Maven Artifact"
    needs: [verify]                  # Solo se ejecuta si verify pasó
    if: github.event_name == 'push'  # Solo en push, no en pull_request
    runs-on: ubuntu-latest

    # --- Variables de entorno para autenticación con GitHub Packages ---
    env:
      MAVEN_USERNAME: ${{ github.actor }}
      MAVEN_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # --- Checkout del código fuente ---
      - name: "Checkout repository"
        uses: actions/checkout@v4

      # --- Configurar JDK 21 con credenciales para GitHub Packages ---
      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_TOKEN

      # --- Dar permisos de ejecución al Maven Wrapper ---
      - name: "Grant execute permission to mvnw"
        run: chmod +x ./mvnw

      # --- Empaquetar sin re-ejecutar tests (ya pasaron en Job 1) ---
      - name: "Package JAR"
        run: ./mvnw --batch-mode --no-transfer-progress -DskipTests package

      # --- Subir artefacto al workflow run ---
      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: maven-artifact-${{ github.run_number }}
          path: |
            target/*.jar
            target/*.war
          if-no-files-found: error
          retention-days: 30

      # --- Validar que artifactId sea todo minúsculas (GitHub Packages lo exige) ---
      - name: "Validate lowercase artifactId"
        run: |
          ARTIFACT_ID=$(./mvnw -q help:evaluate -Dexpression=project.artifactId -DforceStdout)
          echo "artifactId detectado: $ARTIFACT_ID"
          if [[ "$ARTIFACT_ID" =~ [A-Z] ]]; then
            echo "ERROR: artifactId inválido para GitHub Packages (contiene mayúsculas): $ARTIFACT_ID"
            exit 1
          fi
          echo "OK: artifactId '$ARTIFACT_ID' es válido para GitHub Packages."

      # --- Imprimir coordenadas Maven efectivas antes del deploy ---
      - name: "Debug Maven coordinates"
        run: |
          echo "=== Coordenadas Maven efectivas ==="
          echo -n "groupId:    " && ./mvnw -q help:evaluate -Dexpression=project.groupId -DforceStdout && echo
          echo -n "artifactId: " && ./mvnw -q help:evaluate -Dexpression=project.artifactId -DforceStdout && echo
          echo -n "version:    " && ./mvnw -q help:evaluate -Dexpression=project.version -DforceStdout && echo
          echo -n "finalName:  " && ./mvnw -q help:evaluate -Dexpression=project.build.finalName -DforceStdout && echo
          echo -n "registry:   " && ./mvnw -q help:evaluate -Dexpression=project.distributionManagement.repository.url -DforceStdout && echo

      # --- Publicar en GitHub Packages (solo desde main) ---
      - name: "Deploy to GitHub Packages"
        if: github.ref == 'refs/heads/main'
        run: ./mvnw --batch-mode --no-transfer-progress -DskipTests deploy
