name: "CI/CD - Backend"

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "*.md"
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "*.md"

permissions:
  contents: read
  checks: write
  packages: write
  pull-requests: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"
  MAVEN_ARGS: "--batch-mode --no-transfer-progress"
  IMAGE_NAME: "amani-apirest"
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'amani-160bf' }}
  GCP_REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
  GCP_ARTIFACT_REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY }}
  GCP_CLOUD_RUN_SERVICE: ${{ vars.GCP_CLOUD_RUN_SERVICE || 'amani-api' }}
  GCP_CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.GCP_CLOUD_RUN_SERVICE_ACCOUNT }}

jobs:
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: "Grant execute permission to mvnw"
        run: chmod +x ./mvnw

      - name: "Run Maven lint checks"
        run: ./mvnw $MAVEN_ARGS -DskipTests -Dskip.openapi=true compile checkstyle:check pmd:check spotbugs:spotbugs

  build:
    name: "Build"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - lint

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: "Grant execute permission to mvnw"
        run: chmod +x ./mvnw

      - name: "Package JAR"
        run: ./mvnw $MAVEN_ARGS -Dmaven.test.skip=true -Dskip.openapi=true package

      - name: "Upload Maven artifact"
        uses: actions/upload-artifact@v4
        with:
          name: maven-artifact-${{ github.run_number }}
          path: |
            target/*.jar
            target/*.war
          if-no-files-found: error
          retention-days: 30

  test:
    name: "Test"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - build
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: psicologia_app
          POSTGRES_USER: amani
          POSTGRES_PASSWORD: amani
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U amani -d psicologia_app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: "Grant execute permission to mvnw"
        run: chmod +x ./mvnw

      - name: "Initialize database schema"
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U amani -d psicologia_app; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 1
          done

          PGPASSWORD=amani psql \
            -h localhost \
            -p 5432 \
            -U amani \
            -d psicologia_app \
            -f src/main/resources/amani.sql

      - name: "Run Maven tests"
        run: ./mvnw $MAVEN_ARGS verify -Dskip.openapi=true
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/psicologia_app
          SPRING_DATASOURCE_USERNAME: amani
          SPRING_DATASOURCE_PASSWORD: amani
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
          SPRING_SQL_INIT_MODE: never

      - name: "Generate HTML Test Dashboard"
        if: always()
        run: |
          python3 .github/scripts/generate-html-dashboard.py \
            --surefire target/surefire-reports \
            --failsafe target/failsafe-reports \
            --output reports/html

      - name: "Generate Visual Summary"
        if: always()
        run: |
          bash .github/scripts/generate-summary.sh \
            target/surefire-reports \
            target/failsafe-reports \
            target/site/jacoco/jacoco.csv

          if [ -f target/site/jacoco/jacoco.csv ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "---" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "## Cobertura P0 y P1" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            bash scripts/generate-p0-coverage-visual.sh target/site/jacoco/jacoco.csv doc
            cat doc/coverage-p0-visual.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "---" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat doc/coverage-p1-visual.md >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Artefactos" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- HTML Dashboard: reports/html/index.html" >> "$GITHUB_STEP_SUMMARY"
          echo "- JaCoCo Coverage: target/site/jacoco" >> "$GITHUB_STEP_SUMMARY"

      - name: "Publish test results"
        if: always() && hashFiles('**/target/**/TEST-*.xml') != ''
        uses: dorny/test-reporter@v1.9.1
        with:
          name: "Maven Test Results"
          path: "**/target/**/TEST-*.xml"
          reporter: "java-junit"
          fail-on-error: true

      - name: "SonarQube Scan"
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        run: ./mvnw $MAVEN_ARGS sonar:sonar

      - name: "Upload JUnit XML Reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml-reports
          path: |
            target/surefire-reports
            target/failsafe-reports
          if-no-files-found: ignore

      - name: "Upload HTML Dashboard"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-test-dashboard
          path: reports/html
          if-no-files-found: ignore

      - name: "Upload JaCoCo Coverage"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco
          if-no-files-found: ignore

  docker-build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - test
    if: github.event_name == 'push'
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: "Validate image publish configuration"
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "::error::Missing repository secret GCP_SA_KEY."
            exit 1
          fi

          if [ -z "$GCP_ARTIFACT_REPOSITORY" ]; then
            echo "::error::Missing repository variable GCP_ARTIFACT_REPOSITORY."
            exit 1
          fi

          echo "IMAGE_URI=$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GCP_ARTIFACT_REPOSITORY/$IMAGE_NAME:$GITHUB_SHA" >> "$GITHUB_ENV"

      - name: "Authenticate to Google Cloud"
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: "Set up gcloud"
        uses: google-github-actions/setup-gcloud@v2

      - name: "Configure Docker for Artifact Registry"
        run: gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet

      - name: "Grant execute permission to mvnw"
        run: chmod +x ./mvnw

      - name: "Build image with Spring Boot Buildpacks"
        run: ./mvnw $MAVEN_ARGS -Dmaven.test.skip=true -Dskip.openapi=true spring-boot:build-image -Dspring-boot.build-image.imageName="$IMAGE_URI"

      - name: "Push image"
        run: docker push "$IMAGE_URI"

  deploy:
    name: "Deploy"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

    steps:
      - name: "Validate deploy configuration"
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "::error::Missing repository secret GCP_SA_KEY."
            exit 1
          fi

          if [ -z "$GCP_ARTIFACT_REPOSITORY" ]; then
            echo "::error::Missing repository variable GCP_ARTIFACT_REPOSITORY."
            exit 1
          fi

          echo "IMAGE_URI=$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GCP_ARTIFACT_REPOSITORY/$IMAGE_NAME:$GITHUB_SHA" >> "$GITHUB_ENV"

      - name: "Authenticate to Google Cloud"
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: "Set up gcloud"
        uses: google-github-actions/setup-gcloud@v2

      - name: "Deploy to Cloud Run"
        run: |
          SERVICE_ACCOUNT_ARG=()
          if [ -n "$GCP_CLOUD_RUN_SERVICE_ACCOUNT" ]; then
            SERVICE_ACCOUNT_ARG=(--service-account "$GCP_CLOUD_RUN_SERVICE_ACCOUNT")
          fi

          gcloud run deploy "$GCP_CLOUD_RUN_SERVICE" \
            --image "$IMAGE_URI" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --platform managed \
            --set-env-vars "SPRING_PROFILES_ACTIVE=gcp" \
            "${SERVICE_ACCOUNT_ARG[@]}"
