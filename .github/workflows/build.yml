# =============================================================================
# CI – Build & Artifact
# =============================================================================
# NOTA: Para que el paso de deploy a GitHub Packages funcione,
# añadir al final de pom.xml (antes de </project>):
#
#   <distributionManagement>
#     <repository>
#       <id>github</id>
#       <name>GitHub Packages</name>
#       <url>https://maven.pkg.github.com/OWNER/REPO</url>
#     </repository>
#   </distributionManagement>
#
# Reemplazar OWNER/REPO con el propietario y nombre del repositorio.
# =============================================================================

name: "CI – Build & Artifact"

# ---------------------------------------------------------------------------
# Permisos globales del workflow
# ---------------------------------------------------------------------------
permissions:
  contents: read       # lectura del repo (checkout)
  checks: write       # escritura de checks (test-reporter)
  packages: write     # publicación en GitHub Packages (deploy)

# ---------------------------------------------------------------------------
# Evitar ejecuciones paralelas en la misma rama
# ---------------------------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Variables de entorno globales
# ---------------------------------------------------------------------------
env:
  JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"

# ---------------------------------------------------------------------------
# Disparadores del workflow
# ---------------------------------------------------------------------------
on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop

# =============================================================================
# JOBS
# =============================================================================
jobs:

  # ===========================================================================
  # Job 1: Verificar compilación y ejecutar tests
  # ===========================================================================
  verify:
    name: "Verify – Compile & Test"
    runs-on: ubuntu-latest

    steps:
      # --- Checkout del código fuente ---
      - name: "Checkout repository"
        uses: actions/checkout@v4

      # --- Configurar JDK 21 (coincide con <java.version> del pom.xml) ---
      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # --- Dar permisos de ejecución al Maven Wrapper ---
      - name: "Grant execute permission to mvnw"
        run: chmod +x ./mvnw

      # --- Compilar y ejecutar tests (verify incluye compile, test y análisis) ---
      - name: "Compile & test (verify)"
        run: ./mvnw --batch-mode --update-snapshots verify

      # --- Publicar resultados de tests como check de GitHub ---
      - name: "Publish test results"
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: '**/target/surefire-reports/*.xml'
          reporter: java-junit
          fail-on-error: true

  # ===========================================================================
  # Job 2: Construir artefacto y publicar en GitHub Packages
  # ===========================================================================
  build-artifact:
    name: "Build – Maven Artifact"
    needs: [verify]                  # Solo se ejecuta si verify pasó
    if: github.event_name == 'push'  # Solo en push, no en pull_request
    runs-on: ubuntu-latest

    steps:
      # --- Checkout del código fuente ---
      - name: "Checkout repository"
        uses: actions/checkout@v4

      # --- Configurar JDK 21 con credenciales para GitHub Packages ---
      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      # --- Dar permisos de ejecución al Maven Wrapper ---
      - name: "Grant execute permission to mvnw"
        run: chmod +x ./mvnw

      # --- Empaquetar sin re-ejecutar tests (ya pasaron en Job 1) ---
      - name: "Package JAR"
        run: ./mvnw --batch-mode -DskipTests package

      # --- Copiar artefactos a carpeta de staging ---
      - name: "Stage artifacts"
        run: |
          mkdir -p staging
          cp target/*.jar staging/ 2>/dev/null || true
          cp target/*.war staging/ 2>/dev/null || true

      # --- Subir artefacto al workflow run ---
      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: maven-artifact-${{ github.sha }}
          path: staging/
          retention-days: 30
          if-no-files-found: error

      # --- Publicar en GitHub Packages (solo desde main) ---
      - name: "Deploy to GitHub Packages"
        if: github.ref == 'refs/heads/main'
        run: ./mvnw --batch-mode -DskipTests deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}