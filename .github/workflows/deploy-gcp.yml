name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  SERVICE_NAME: amani-api
  IMAGE_NAME: ${{ vars.GCP_ARTIFACT_REGISTRY }}/amani-apirest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Docker image (with Jib)
        run: |
          ./mvnw clean compile jib:build \
            -Denv.REGISTRY_URL=${{ vars.GCP_ARTIFACT_REGISTRY }} \
            -DskipTests

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_NAME }}:latest
          flags: >
            --allow-unauthenticated
            --set-env-vars=SPRING_PROFILES_ACTIVE=gcp
            --set-env-vars="DB_URL=jdbc:postgresql:///postgres?cloudSqlInstance=${{ env.PROJECT_ID }}:${{ env.REGION }}:amani-db&socketFactory=com.google.cloud.sql.postgres.SocketFactory"
            --set-env-vars=DB_USERNAME=postgres
            --set-secrets=DB_PASSWORD=db-password:latest
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:amani-db
            --service-account=${{ vars.GCP_SERVICE_ACCOUNT }}
