name: "Docs - Build & Deploy to GitHub Pages"

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "pom.xml"
      - "src/main/java/**"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-docs:
    name: "Deploy docs to gh-pages"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: "Set up uv"
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: "Install MkDocs dependencies"
        run: uv sync --frozen

      - name: "Grant execute permission to mvnw"
        run: chmod +x ./mvnw

      - name: "Generate Documentation (Javadoc, Dokka, OpenAPI)"
        run: |
          ./mvnw javadoc:javadoc dokka:dokka -DskipTests -q
          # Generar OpenAPI JSON (requiere contexto de Spring)
          ./mvnw springdoc-openapi:generate -Dspring.profiles.active=test -DskipTests -q

      - name: "Deploy to gh-pages"
        run: uv run mkdocs gh-deploy --force --clean
