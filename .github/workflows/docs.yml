name: "Docs - Deploy to gh-pages branch"

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "pom.xml"
      - "src/main/java/**"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-docs:
    name: "Build and deploy docs to gh-pages branch"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: "Set up uv"
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: "Install MkDocs dependencies"
        run: uv sync --frozen

      - name: "Grant execute permission to mvnw"
        run: chmod +x ./mvnw

      - name: "Generate Documentation (Javadoc, Dokka, OpenAPI)"
        env:
          SPRING_PROFILES_ACTIVE: test
          FIREBASE_ENABLED: "false"
          GOOGLE_CLOUD_PROJECT: "test-project"
        run: |
          # Generar Javadoc y Dokka
          ./mvnw javadoc:javadoc dokka:dokka -DskipTests -q || true

          # Generar OpenAPI JSON
          # El plugin springdoc-openapi intenta arrancar la app en el puerto 8080
          ./mvnw springdoc-openapi:generate -Dspring.profiles.active=test -DskipTests -q || true

      - name: "Configure Git user"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: "Deploy to gh-pages branch via MkDocs"
        run: uv run mkdocs gh-deploy --force
