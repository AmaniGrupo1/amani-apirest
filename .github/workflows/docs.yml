name: "Docs - Build & Deploy to GitHub Pages"

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "pom.xml"
      - "src/main/java/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-docs:
    name: "Build and deploy docs"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: "Set up uv"
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: "Configure GitHub Pages"
        uses: actions/configure-pages@v5

      - name: "Install MkDocs dependencies"
        run: uv sync --frozen

      - name: "Grant execute permission to mvnw"
        run: chmod +x ./mvnw

      - name: "Generate Documentation (Javadoc, Dokka, OpenAPI)"
        env:
          SPRING_PROFILES_ACTIVE: test
          FIREBASE_ENABLED: "false"
          GOOGLE_CLOUD_PROJECT: "test-project"
        run: |
          # Generar Javadoc y Dokka
          ./mvnw javadoc:javadoc dokka:dokka -DskipTests -q

          # Generar OpenAPI JSON
          # El plugin springdoc-openapi intenta arrancar la app en el puerto 8080
          ./mvnw springdoc-openapi:generate -Dspring.profiles.active=test -DskipTests -q

      - name: "Build MkDocs site"
        run: uv run mkdocs build --strict

      - name: "Upload GitHub Pages artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: "Deploy to GitHub Pages"
        uses: actions/deploy-pages@v4
