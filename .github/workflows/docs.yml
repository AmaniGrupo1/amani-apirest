name: "Docs - Build & Deploy to GitHub Pages"

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "pom.xml"
      - "src/main/java/**"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-docs:
    name: "Deploy docs to gh-pages"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: "Set up uv"
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: "Install MkDocs dependencies"
        run: uv sync --frozen

      - name: "Grant execute permission to mvnw"
        run: chmod +x ./mvnw

      - name: "Configure Git"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: "Generate Documentation (Javadoc, Dokka, OpenAPI)"
        env:
          SPRING_PROFILES_ACTIVE: test
          FIREBASE_ENABLED: "false"
          GOOGLE_CLOUD_PROJECT: "test-project"
        run: |
          # Generar Javadoc y Dokka
          ./mvnw javadoc:javadoc dokka:dokka -DskipTests -q
          
          # Generar OpenAPI JSON
          # El plugin springdoc-openapi intenta arrancar la app en el puerto 8080
          ./mvnw springdoc-openapi:generate -Dspring.profiles.active=test -DskipTests -q || echo "OpenAPI generation failed, check logs"

      - name: "Deploy to gh-pages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          uv run mkdocs gh-deploy --force --clean
